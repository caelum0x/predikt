[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]

# Match the original Gnosis Truffle config (solc 0.5.10, optimizer on).
# forge downloads solc 0.5.x automatically for the ^0.5.1 pragmas.
solc = "0.5.10"
optimizer = true
optimizer_runs = 200
evm_version = "istanbul"

# Resolve the npm-era imports used by the Gnosis sources.
remappings = [
    "openzeppelin-solidity/=node_modules/openzeppelin-solidity/",
    "@gnosis.pm/conditional-tokens-contracts/=node_modules/@gnosis.pm/conditional-tokens-contracts/",
]

# The FixedProductMarketMaker + FPMMDeterministicFactory target contracts do NOT
# depend on @gnosis.pm/util-contracts. The LMSR market makers and the legacy
# FixedProductMarketMakerFactory do (ConstructedCloneFactory / Fixed192x64Math /
# SignedSafeMath), and that package's npm install is broken by a stale transitive
# git dependency. Skip those files so the deploy-ready FPMM set builds cleanly.
skip = [
    "contracts/LMSRMarketMaker.sol",
    "contracts/LMSRMarketMakerFactory.sol",
    "contracts/MarketMaker.sol",
    "contracts/FixedProductMarketMakerFactory.sol",
    "contracts/Whitelist.sol",
    "contracts/Migrations.sol",
]
